<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 | Moon Arclen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
color:white;
background:
radial-gradient(circle at 20% 20%, rgba(99,102,241,.25), transparent 25%),
radial-gradient(circle at 80% 40%, rgba(14,165,233,.2), transparent 25%),
radial-gradient(circle at 50% 80%, rgba(168,85,247,.18), transparent 20%),
#030712;
background-size:100% 100%;
padding:20px;
}

.stars::before,
.stars::after{
content:"";
position:absolute;
inset:0;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:120px 120px,180px 180px;
opacity:.25;
pointer-events:none;
}

.box{
position:relative;
z-index:2;
max-width:700px;
padding:40px;
background:rgba(15,23,42,.7);
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
backdrop-filter:blur(8px);
}

h1{
font-size:7rem;
font-weight:900;
text-shadow:0 0 20px rgba(96,165,250,.45);
}

h2{
font-size:2rem;
margin-bottom:15px;
}

p{
color:#cbd5e1;
margin-bottom:25px;
}

a{
display:inline-block;
padding:14px 26px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:700;
}

.small{
margin-top:20px;
font-size:.9rem;
color:#94a3b8;
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="box">
<h1>404</h1>
<h2>Lost in the Galaxy</h2>
<p>The page you're looking for drifted into deep space or was never created.</p>

<a href="/">Return Home</a>

<div class="small">
Moon Arclen • ma.work.gd
</div>
</div>

</body>
</html>
