<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Me Not</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
    <div id="logo">Flip Me Not</div>
    <div id="distance">Distance: 0</div>
    <div id="coins">Coins: 0</div>
</div>

<button id="pauseBtn"><i class="fa-solid fa-pause"></i></button>

<!-- Start Screen -->
<div class="screen" id="startScreen">
    <div class="panel">
        <div id="title">Flip<br>Me Not</div>
        <div id="subtitle">Flip gravity.<br>Dodge spikes.<br>Survive forever.</div>
        <div id="menuStats">
            <div class="menuStat"><span>Coins</span><strong id="menuCoins">0</strong></div>
            <div class="menuStat"><span>High Score</span><strong id="menuHigh">0</strong></div>
        </div>
        <button class="menuBtn playBtn" onclick="startGame()">Play</button>
        <button class="menuBtn shopBtn" onclick="openScreen('shopScreen')">Shop</button>
        <button class="menuBtn settingsBtn" onclick="openScreen('settingsScreen')">Settings</button>
        <button class="menuBtn leaderBtn" onclick="openScreen('leaderboardScreen')">Leaderboard</button>

        <div id="socials">
            <a href="https://youtube.com/@moonarclen" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://github.com/moonarclen" target="_blank"><i class="fa-brands fa-github"></i></a>
            <a href="https://twitch.tv/moonarclen" target="_blank"><i class="fa-brands fa-twitch"></i></a>
            <a href="https://dsc.gg/moonarclen" target="_blank"><i class="fa-brands fa-discord"></i></a>
        </div>
        <div id="copyright">Music & Art © Moon Arclen</div>
    </div>
</div>

<!-- Other Screens -->
<div class="screen hidden" id="settingsScreen"></div>
<div class="screen hidden" id="shopScreen"></div>
<div class="screen hidden" id="howToPlayScreen"></div>
<div class="screen hidden" id="creditsScreen"></div>
<div class="screen hidden" id="websiteScreen"></div>
<div class="screen hidden" id="wikiScreen"></div>
<div class="screen hidden" id="leaderboardScreen"></div>

<!-- Scripts -->
<script src="audio.js"></script>
<script src="game.js"></script>
<script src="ui.js"></script>
<script src="input.js"></script>

</body>
</html>
