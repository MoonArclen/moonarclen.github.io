<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Flip Me Not</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#050816;
    font-family:Arial,sans-serif;
    touch-action:manipulation;
}

canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:block;
}

.screen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:50;
}

.panel{
    width:min(92vw,430px);
    background:rgba(10,14,28,.96);
    border:1px solid rgba(255,255,255,.06);
    border-radius:30px;
    padding:28px;
    box-shadow:0 20px 70px rgba(0,0,0,.5);
    color:white;
    position:relative;
}

#startScreen{
    background:
    radial-gradient(
        circle at top,
        #12182d,
        #050816 72%
    );
}

#title{
    font-size:clamp(3rem,10vw,5rem);
    line-height:.9;
    margin-bottom:14px;
    font-weight:900;
}

#subtitle{
    color:#9eabd4;
    line-height:1.7;
    margin-bottom:20px;
}

#menuStats{
    display:flex;
    gap:12px;
    margin-bottom:18px;
}

.menuStat{
    flex:1;
    background:rgba(255,255,255,.05);
    border-radius:18px;
    padding:14px;
    text-align:center;
}

.menuStat span{
    display:block;
    color:#8b97bd;
    font-size:.82rem;
}

.menuStat strong{
    display:block;
    margin-top:5px;
    font-size:1.45rem;
}

.menuBtn{
    width:100%;
    padding:16px;
    margin-top:12px;
    border:none;
    border-radius:18px;
    color:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.15s;
}

.menuBtn:hover{
    transform:translateY(-2px);
}

.menuBtn:active{
    transform:scale(.98);
}

.playBtn{
    background:#6177dc;
}

.shopBtn{
    background:#7f64cf;
}

.creditBtn{
    background:#38466e;
}

.settingsBtn{
    background:#4f5f96;
}

.toggleBtn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    color:white;
    font-size:1rem;
    cursor:pointer;
}

.settingRow{
    margin-top:20px;
}

.settingTitle{
    margin-bottom:10px;
    color:#c5d0f2;
}

#socialWrap{
    margin-top:24px;
}

#socials{
    display:flex;
    justify-content:center;
    gap:10px;
}

#socials a{
    width:46px;
    height:46px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-decoration:none;
    transition:.15s;
}

#socials a:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.1);
}

#copyright{
    text-align:center;
    margin-top:12px;
    color:#8f9bc2;
    font-size:.85rem;
}

#hud{
    position:fixed;
    top:16px;
    left:16px;
    z-index:20;
    color:white;
}

#logo{
    font-size:clamp(1.8rem,4vw,2.8rem);
    font-weight:900;
}

#distance,
#coins{
    margin-top:5px;
    color:#aeb9dd;
}

#pauseBtn{
    position:fixed;
    top:16px;
    right:16px;
    width:54px;
    height:54px;
    border:none;
    border-radius:16px;
    background:rgba(12,18,34,.92);
    color:white;
    font-size:1rem;
    cursor:pointer;
    z-index:20;
}

#creditsScreen,
#shopScreen,
#pauseMenu,
#gameOver,
#settingsScreen{
    display:none;
    background:rgba(0,0,0,.68);
}

.closeBtn{
    position:absolute;
    top:16px;
    right:16px;
    width:48px;
    height:48px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    color:white;
    cursor:pointer;
}

#creditsContent{
    max-height:60vh;
    overflow:auto;
}

.creditRole{
    color:#8ea1df;
    margin-top:20px;
    font-size:1rem;
}

.creditName{
    font-size:1.4rem;
    margin-top:6px;
}

#shopGrid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    margin-top:20px;
}

.shopItem{
    background:rgba(255,255,255,.05);
    border-radius:18px;
    padding:20px;
    text-align:center;
}

.shopIcon{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:18px;
    background:rgba(255,255,255,.06);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:1.8rem;
}

.shopName{
    margin-top:12px;
    color:#c4cdec;
}

.finalText{
    margin-top:10px;
    color:#b8c3e6;
}

#shareWrap{
    margin-top:22px;
}

#shareTitle{
    color:#aab5d9;
    margin-bottom:12px;
    font-size:.95rem;
    text-align:center;
}

#shareButtons{
    display:flex;
    justify-content:center;
    gap:12px;
}

.shareBtn{
    width:54px;
    height:54px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    color:white;
    font-size:1rem;
    cursor:pointer;
}

@media(max-width:650px){

    #menuStats{
        flex-direction:column;
    }

    #shopGrid{
        grid-template-columns:1fr;
    }

    .panel{
        padding:22px;
    }
}

</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">

    <div id="logo">
        Flip Me Not
    </div>

    <div id="distance">
        Distance: 0
    </div>

    <div id="coins">
        Coins: 0
    </div>

</div>

<button id="pauseBtn">
    <i class="fa-solid fa-pause"></i>
</button>

<div class="screen" id="startScreen">

    <div class="panel">

        <div id="title">
            Flip<br>Me Not
        </div>

        <div id="subtitle">
            Flip gravity.<br>
            Dodge spikes.<br>
            Survive forever.
        </div>

        <div id="menuStats">

            <div class="menuStat">
                <span>Total Coins</span>
                <strong id="menuCoins">0</strong>
            </div>

            <div class="menuStat">
                <span>High Score</span>
                <strong id="menuHigh">0</strong>
            </div>

        </div>

        <button class="menuBtn playBtn" onclick="startGame()">
            Play
        </button>

        <button class="menuBtn shopBtn" onclick="openShop()">
            Shop
        </button>

        <button class="menuBtn creditBtn" onclick="openCredits()">
            Credits
        </button>

        <button class="menuBtn settingsBtn" onclick="openSettings()">
            Settings
        </button>

        <div id="socialWrap">

            <div id="socials">

                <a href="https://youtube.com" target="_blank">
                    <i class="fa-brands fa-youtube"></i>
                </a>

                <a href="https://discord.com" target="_blank">
                    <i class="fa-brands fa-discord"></i>
                </a>

                <a href="https://twitch.tv" target="_blank">
                    <i class="fa-brands fa-twitch"></i>
                </a>

                <a href="https://github.com" target="_blank">
                    <i class="fa-brands fa-github"></i>
                </a>

            </div>

            <div id="copyright">
                © Music & Art
            </div>

        </div>

    </div>

</div>

<div class="screen" id="settingsScreen">

    <div class="panel">

        <button class="closeBtn" onclick="closeSettings()">
            ✕
        </button>

        <h1>
            Settings
        </h1>

        <div class="settingRow">

            <div class="settingTitle">
                Account
            </div>

            <button class="toggleBtn" onclick="loginGithub()">
                Connect GitHub
            </button>

            <button class="toggleBtn"
            style="margin-top:10px"
            onclick="loginItch()">
                Connect Itch.io
            </button>

            <div id="accountStatus"
            style="
            margin-top:14px;
            color:#9fb0e8;
            font-size:.95rem;
            ">
                Not Connected
            </div>

        </div>

        <div class="settingRow">

            <div class="settingTitle">
                Music
            </div>

            <button class="toggleBtn"
            id="musicToggle"
            onclick="toggleMusic()">
                Music: ON
            </button>

        </div>

        <div class="settingRow">

            <div class="settingTitle">
                Sound Effects
            </div>

            <button class="toggleBtn"
            id="soundToggle"
            onclick="toggleSounds()">
                Sounds: ON
            </button>

        </div>

    </div>

</div>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

    canvas.width =
    innerWidth;

    canvas.height =
    innerHeight;
}

resize();

window.addEventListener(
"resize",
resize
);

let musicEnabled = true;
let soundEnabled = true;

let accountData =
JSON.parse(
localStorage.getItem(
"flipAccount"
)
) || null;

const music =
new Audio(
"https://ma.work.gd/sounds/Crimson-Moon"
);

music.loop = true;
music.volume = .45;

const dieSound =
new Audio(
"https://ma.work.gd/sounds/die"
);

dieSound.volume = .8;

let totalCoins =
parseInt(
localStorage.getItem(
"flipCoins"
) || 0
);

let highScore =
parseInt(
localStorage.getItem(
"flipHigh"
) || 0
);

if(accountData){

    totalCoins =
    accountData.coins || 0;

    highScore =
    accountData.highScore || 0;
}

document.getElementById(
"menuCoins"
).innerText =
totalCoins;

document.getElementById(
"menuHigh"
).innerText =
highScore;

function openSettings(){

    document.getElementById(
    "settingsScreen"
    ).style.display =
    "flex";
}

function closeSettings(){

    document.getElementById(
    "settingsScreen"
    ).style.display =
    "none";
}

function toggleMusic(){

    musicEnabled =
    !musicEnabled;

    document.getElementById(
    "musicToggle"
    ).innerText =
    "Music: " +
    (
        musicEnabled
        ?
        "ON"
        :
        "OFF"
    );

    if(musicEnabled){

        music.play()
        .catch(()=>{});

    }else{

        music.pause();
    }
}

function toggleSounds(){

    soundEnabled =
    !soundEnabled;

    document.getElementById(
    "soundToggle"
    ).innerText =
    "Sounds: " +
    (
        soundEnabled
        ?
        "ON"
        :
        "OFF"
    );
}

function updateAccountUI(){

    if(accountData){

        document.getElementById(
        "accountStatus"
        ).innerText =
        "Connected: " +
        accountData.type +
        " @" +
        accountData.username;

    }else{

        document.getElementById(
        "accountStatus"
        ).innerText =
        "Not Connected";
    }
}

function loginGithub(){

    const username =
    prompt(
    "Enter GitHub Username"
    );

    if(!username)
    return;

    accountData = {

        type:"GitHub",
        username
    };

    saveAccount();
}

function loginItch(){

    const username =
    prompt(
    "Enter Itch.io Username"
    );

    if(!username)
    return;

    accountData = {

        type:"Itch.io",
        username
    };

    saveAccount();
}

function saveAccount(){

    const saveData = {

        type:
        accountData.type,

        username:
        accountData.username,

        coins:
        totalCoins,

        highScore:
        highScore
    };

    localStorage.setItem(
    "flipAccount",
    JSON.stringify(saveData)
    );

    updateAccountUI();
}

updateAccountUI();

</script>
</body>
</html>
