<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Flip Me Not</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#050816;
    font-family:Arial,sans-serif;
    touch-action:manipulation;
}

canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:block;
}

.screen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:50;
}

.panel{
    width:min(92vw,430px);
    max-height:90vh;
    overflow:auto;

    background:rgba(10,14,28,.96);

    border:1px solid rgba(255,255,255,.06);

    border-radius:30px;

    padding:28px;

    box-shadow:0 20px 70px rgba(0,0,0,.5);

    color:white;

    position:relative;
}

#startScreen{
    background:
    radial-gradient(
        circle at top,
        #12182d,
        #050816 72%
    );
}

#title{
    font-size:clamp(3rem,10vw,5rem);
    line-height:.9;
    margin-bottom:14px;
    font-weight:900;
}

#subtitle{
    color:#9eabd4;
    line-height:1.7;
    margin-bottom:20px;
}

#menuStats{
    display:flex;
    gap:12px;
    margin-bottom:18px;
}

.menuStat{
    flex:1;
    background:rgba(255,255,255,.05);
    border-radius:18px;
    padding:14px;
    text-align:center;
}

.menuStat span{
    display:block;
    color:#8b97bd;
    font-size:.82rem;
}

.menuStat strong{
    display:block;
    margin-top:5px;
    font-size:1.45rem;
}

.menuBtn{
    width:100%;
    padding:16px;
    margin-top:12px;
    border:none;
    border-radius:18px;
    color:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.15s;
}

.menuBtn:hover{
    transform:translateY(-2px);
}

.menuBtn:active{
    transform:scale(.98);
}

.playBtn{
    background:#6177dc;
}

.shopBtn{
    background:#7f64cf;
}

.creditBtn{
    background:#38466e;
}

.settingsBtn{
    background:#4f5f96;
}

.leaderBtn{
    background:#596bc7;
}

.toggleBtn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    color:white;
    font-size:1rem;
    cursor:pointer;
}

.settingRow{
    margin-top:20px;
}

.settingTitle{
    margin-bottom:10px;
    color:#c5d0f2;
}

.settingInput{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    color:white;
    font-size:1rem;
}

#socialWrap{
    margin-top:24px;
}

#socials{
    display:flex;
    justify-content:center;
    gap:10px;
}

#socials a{
    width:46px;
    height:46px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-decoration:none;
    transition:.15s;
}

#socials a:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.1);
}

#copyright{
    text-align:center;
    margin-top:12px;
    color:#8f9bc2;
    font-size:.85rem;
}

#hud{
    position:fixed;
    top:16px;
    left:16px;
    z-index:20;
    color:white;
}

#logo{
    font-size:clamp(1.8rem,4vw,2.8rem);
    font-weight:900;
}

#distance,
#coins{
    margin-top:5px;
    color:#aeb9dd;
}

#pauseBtn{
    position:fixed;
    top:16px;
    right:16px;
    width:54px;
    height:54px;
    border:none;
    border-radius:16px;
    background:rgba(12,18,34,.92);
    color:white;
    font-size:1rem;
    cursor:pointer;
    z-index:20;
}

#settingsScreen,
#leaderboardScreen,
#pauseMenu,
#gameOver{
    display:none;
    background:rgba(0,0,0,.68);
}

.closeBtn{
    position:absolute;
    top:16px;
    right:16px;
    width:48px;
    height:48px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    color:white;
    cursor:pointer;
}

.leaderboardItem{
    margin-top:12px;
    padding:14px;
    border-radius:16px;
    background:rgba(255,255,255,.05);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.finalText{
    margin-top:10px;
    color:#b8c3e6;
}

@media(max-width:650px){

    #menuStats{
        flex-direction:column;
    }

    .panel{
        padding:22px;
    }
}

</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">

    <div id="logo">
        Flip Me Not
    </div>

    <div id="distance">
        Distance: 0
    </div>

    <div id="coins">
        Coins: 0
    </div>

</div>

<button id="pauseBtn">
    <i class="fa-solid fa-pause"></i>
</button>

<div class="screen" id="startScreen">

    <div class="panel">

        <div id="title">
            Flip<br>Me Not
        </div>

        <div id="subtitle">
            Flip gravity.<br>
            Dodge spikes.<br>
            Survive forever.
        </div>

        <div id="menuStats">

            <div class="menuStat">
                <span>Total Coins</span>
                <strong id="menuCoins">0</strong>
            </div>

            <div class="menuStat">
                <span>High Score</span>
                <strong id="menuHigh">0</strong>
            </div>

        </div>

        <button class="menuBtn playBtn" onclick="startGame()">
            Play
        </button>

        <button class="menuBtn settingsBtn" onclick="openSettings()">
            Settings
        </button>

        <button class="menuBtn leaderBtn" onclick="openLeaderboard()">
            Leaderboard
        </button>

        <div id="socialWrap">

            <div id="socials">

                <a href="https://youtube.com" target="_blank">
                    <i class="fa-brands fa-youtube"></i>
                </a>

                <a href="https://discord.com" target="_blank">
                    <i class="fa-brands fa-discord"></i>
                </a>

                <a href="https://twitch.tv" target="_blank">
                    <i class="fa-brands fa-twitch"></i>
                </a>

                <a href="https://github.com" target="_blank">
                    <i class="fa-brands fa-github"></i>
                </a>

            </div>

            <div id="copyright">
                © Music & Art
            </div>

        </div>

    </div>

</div>

<div class="screen" id="settingsScreen">

    <div class="panel">

        <button class="closeBtn" onclick="closeSettings()">
            ✕
        </button>

        <h1>
            Settings
        </h1>

        <div class="settingRow">

            <div class="settingTitle">
                Display Name
            </div>

            <input
            id="displayNameInput"
            class="settingInput"
            maxlength="18"
            placeholder="Player">

            <button
            class="menuBtn settingsBtn"
            onclick="saveDisplayName()">
                Save Display Name
            </button>

        </div>

        <div class="settingRow">

            <div class="settingTitle">
                Account
            </div>

            <button class="toggleBtn"
            onclick="oauthComingSoon()">
                GitHub OAuth
            </button>

            <button class="toggleBtn"
            style="margin-top:10px"
            onclick="oauthComingSoon()">
                Itch.io OAuth
            </button>

            <div id="accountStatus"
            style="
            margin-top:14px;
            color:#9fb0e8;
            font-size:.95rem;
            ">
                OAuth Coming Soon
            </div>

        </div>

        <div class="settingRow">

            <div class="settingTitle">
                Music
            </div>

            <button class="toggleBtn"
            id="musicToggle"
            onclick="toggleMusic()">
                Music: ON
            </button>

        </div>

        <div class="settingRow">

            <div class="settingTitle">
                Sounds
            </div>

            <button class="toggleBtn"
            id="soundToggle"
            onclick="toggleSounds()">
                Sounds: ON
            </button>

        </div>

    </div>

</div>

<div class="screen" id="leaderboardScreen">

    <div class="panel">

        <button class="closeBtn"
        onclick="closeLeaderboard()">
            ✕
        </button>

        <h1>
            Leaderboard
        </h1>

        <div id="leaderboardList">

        </div>

    </div>

</div>

<div class="screen" id="pauseMenu">

    <div class="panel">

        <h1>
            Paused
        </h1>

        <button class="menuBtn playBtn"
        onclick="resumeGame()">
            Resume
        </button>

        <button class="menuBtn creditBtn"
        onclick="location.reload()">
            Quit
        </button>

    </div>

</div>

<div class="screen" id="gameOver">

    <div class="panel">

        <h1>
            Game Over
        </h1>

        <div class="finalText"
        id="finalDistance">
            Distance: 0
        </div>

        <div class="finalText"
        id="finalCoins">
            Coins Earned: 0
        </div>

        <div class="finalText"
        id="finalHigh">
            High Score: 0
        </div>

        <button class="menuBtn playBtn"
        onclick="restartGame()">
            Play Again
        </button>

        <button class="menuBtn creditBtn"
        onclick="location.reload()">
            Main Menu
        </button>

    </div>

</div>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

    canvas.width =
    innerWidth;

    canvas.height =
    innerHeight;
}

resize();

window.addEventListener(
"resize",
resize
);

const FLOOR = 34;
const CEILING = 34;

let gravity = .85;
let gravityDirection = 1;

let gameRunning = false;
let paused = false;

let score = 0;
let coins = 0;
let speed = 7;

let spikes = [];
let spikeLoop;

let musicEnabled = true;
let soundEnabled = true;

let totalCoins =
parseInt(
localStorage.getItem(
"flipCoins"
) || 0
);

let highScore =
parseInt(
localStorage.getItem(
"flipHigh"
) || 0
);

let displayName =
localStorage.getItem(
"flipDisplayName"
)
||
"Player";

document.getElementById(
"displayNameInput"
).value =
displayName;

const music =
new Audio(
"https://ma.work.gd/sounds/Crimson-Moon"
);

music.loop = true;
music.volume = .45;

const dieSound =
new Audio(
"https://ma.work.gd/sounds/die"
);

dieSound.volume = .8;

document.getElementById(
"menuCoins"
).innerText =
totalCoins;

document.getElementById(
"menuHigh"
).innerText =
highScore;

const player = {

    x:160,
    y:250,

    size:
    Math.min(
    innerWidth * .09,
    56
    ),

    velY:0,
    rotation:0
};

function createSpike(){

    const top =
    Math.random() > .5;

    spikes.push({

        x:
        canvas.width + 60,

        width:
        player.size * .9,

        height:
        player.size * .9,

        top,

        scored:false
    });
}

function drawBackground(){

    const gradient =
    ctx.createLinearGradient(
    0,
    0,
    0,
    canvas.height
    );

    gradient.addColorStop(
    0,
    "#091022"
    );

    gradient.addColorStop(
    1,
    "#050816"
    );

    ctx.fillStyle =
    gradient;

    ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
    );
}

function drawWalls(){

    ctx.fillStyle =
    "#1c2745";

    ctx.fillRect(
    0,
    0,
    canvas.width,
    CEILING
    );

    ctx.fillStyle =
    "#17203a";

    ctx.fillRect(
    0,
    canvas.height -
    FLOOR,
    canvas.width,
    FLOOR
    );
}

function drawPlayer(){

    ctx.save();

    player.rotation +=
    player.velY * .03;

    ctx.translate(
    player.x +
    player.size/2,

    player.y +
    player.size/2
    );

    ctx.rotate(
    player.rotation
    );

    ctx.fillStyle =
    "#7488e8";

    ctx.beginPath();

    ctx.roundRect(
    -player.size/2,
    -player.size/2,
    player.size,
    player.size,
    14
    );

    ctx.fill();

    ctx.restore();
}

function drawSpikes(){

    spikes.forEach(spike=>{

        const y =
        spike.top
        ?
        CEILING
        :
        canvas.height -
        FLOOR -
        spike.height;

        ctx.fillStyle =
        "#f0f4ff";

        ctx.beginPath();

        if(spike.top){

            ctx.moveTo(
            spike.x,
            y
            );

            ctx.lineTo(
            spike.x +
            spike.width/2,
            y +
            spike.height
            );

            ctx.lineTo(
            spike.x +
            spike.width,
            y
            );

        }else{

            ctx.moveTo(
            spike.x,
            y +
            spike.height
            );

            ctx.lineTo(
            spike.x +
            spike.width/2,
            y
            );

            ctx.lineTo(
            spike.x +
            spike.width,
            y +
            spike.height
            );
        }

        ctx.closePath();
        ctx.fill();
    });
}

function updatePlayer(){

    player.velY +=
    gravity *
    gravityDirection;

    player.y +=
    player.velY;

    if(player.y < CEILING){

        player.y =
        CEILING;

        player.velY = 0;
    }

    if(
    player.y +
    player.size
    >
    canvas.height -
    FLOOR
    ){

        player.y =
        canvas.height -
        FLOOR -
        player.size;

        player.velY = 0;
    }
}

function updateSpikes(){

    spikes.forEach(spike=>{

        spike.x -= speed;

        const y =
        spike.top
        ?
        CEILING
        :
        canvas.height -
        FLOOR -
        spike.height;

        if(

        player.x <
        spike.x +
        spike.width

        &&

        player.x +
        player.size >
        spike.x

        &&

        player.y <
        y +
        spike.height

        &&

        player.y +
        player.size >
        y

        ){

            endGame();
        }

        if(

        !spike.scored

        &&

        spike.x +
        spike.width <
        player.x

        ){

            spike.scored =
            true;

            score++;
            coins++;

            document.getElementById(
            "distance"
            ).innerText =
            "Distance: " +
            score;

            document.getElementById(
            "coins"
            ).innerText =
            "Coins: " +
            (totalCoins + coins);
        }
    });

    spikes =
    spikes.filter(
    spike =>
    spike.x > -100
    );
}

function gameLoop(){

    drawBackground();

    if(
    gameRunning &&
    !paused
    ){

        updatePlayer();
        updateSpikes();
    }

    drawWalls();
    drawSpikes();
    drawPlayer();

    requestAnimationFrame(
    gameLoop
    );
}

gameLoop();

function flipGravity(){

    if(!gameRunning)
    return;

    if(paused)
    return;

    gravityDirection *= -1;

    player.velY =
    gravityDirection * 9;
}

function startGame(){

    document.getElementById(
    "startScreen"
    ).style.display =
    "none";

    gameRunning = true;

    if(musicEnabled){

        music.play()
        .catch(()=>{});
    }

    spikeLoop =
    setInterval(()=>{

        if(
        gameRunning &&
        !paused
        ){

            createSpike();
        }

    },1200);
}

function endGame(){

    gameRunning = false;

    clearInterval(
    spikeLoop
    );

    music.pause();

    music.currentTime = 0;

    if(soundEnabled){

        dieSound.currentTime = 0;

        dieSound.play()
        .catch(()=>{});
    }

    totalCoins += coins;

    localStorage.setItem(
    "flipCoins",
    totalCoins
    );

    if(score > highScore){

        highScore = score;

        localStorage.setItem(
        "flipHigh",
        highScore
        );
    }

    saveLeaderboard();

    document.getElementById(
    "finalDistance"
    ).innerText =
    "Distance: " +
    score;

    document.getElementById(
    "finalCoins"
    ).innerText =
    "Coins Earned: " +
    coins;

    document.getElementById(
    "finalHigh"
    ).innerText =
    "High Score: " +
    highScore;

    document.getElementById(
    "gameOver"
    ).style.display =
    "flex";
}

function restartGame(){

    location.reload();
}

function openSettings(){

    document.getElementById(
    "settingsScreen"
    ).style.display =
    "flex";
}

function closeSettings(){

    document.getElementById(
    "settingsScreen"
    ).style.display =
    "none";
}

function openLeaderboard(){

    loadLeaderboard();

    document.getElementById(
    "leaderboardScreen"
    ).style.display =
    "flex";
}

function closeLeaderboard(){

    document.getElementById(
    "leaderboardScreen"
    ).style.display =
    "none";
}

function saveDisplayName(){

    displayName =
    document.getElementById(
    "displayNameInput"
    ).value
    ||
    "Player";

    localStorage.setItem(
    "flipDisplayName",
    displayName
    );

    alert(
    "Display Name Saved"
    );
}

function oauthComingSoon(){

    alert(
    "OAuth Login Coming Soon"
    );
}

function toggleMusic(){

    musicEnabled =
    !musicEnabled;

    document.getElementById(
    "musicToggle"
    ).innerText =
    "Music: " +
    (
    musicEnabled
    ?
    "ON"
    :
    "OFF"
    );

    if(musicEnabled){

        if(gameRunning){

            music.play()
            .catch(()=>{});
        }

    }else{

        music.pause();
    }
}

function toggleSounds(){

    soundEnabled =
    !soundEnabled;

    document.getElementById(
    "soundToggle"
    ).innerText =
    "Sounds: " +
    (
    soundEnabled
    ?
    "ON"
    :
    "OFF"
    );
}

function saveLeaderboard(){

    let board =
    JSON.parse(
    localStorage.getItem(
    "flipLeaderboard"
    ) || "[]"
    );

    board.push({

        name:
        displayName,

        score:
        score
    });

    board.sort(
    (a,b)=>
    b.score -
    a.score
    );

    board =
    board.slice(0,10);

    localStorage.setItem(
    "flipLeaderboard",
    JSON.stringify(board)
    );
}

function loadLeaderboard(){

    const board =
    JSON.parse(
    localStorage.getItem(
    "flipLeaderboard"
    ) || "[]"
    );

    const list =
    document.getElementById(
    "leaderboardList"
    );

    list.innerHTML = "";

    if(board.length === 0){

        list.innerHTML =
        "<div class='leaderboardItem'>No Scores Yet</div>";

        return;
    }

    board.forEach((item,index)=>{

        list.innerHTML +=
        `
        <div class="leaderboardItem">

            <div>
                #${index + 1}
                ${item.name}
            </div>

            <div>
                ${item.score}
            </div>

        </div>
        `;
    });
}

document.getElementById(
"pauseBtn"
).onclick = ()=>{

    if(!gameRunning)
    return;

    paused = true;

    document.getElementById(
    "pauseMenu"
    ).style.display =
    "flex";
};

function resumeGame(){

    paused = false;

    document.getElementById(
    "pauseMenu"
    ).style.display =
    "none";
}

window.addEventListener(
"keydown",
e=>{

    if(
    e.code ===
    "Space"
    ){

        e.preventDefault();

        flipGravity();
    }
});

window.addEventListener(
"pointerdown",
e=>{

    const tag =
    e.target.tagName;

    if(

    tag === "BUTTON"

    ||

    tag === "INPUT"

    ||

    tag === "A"

    ||

    e.target.closest(
    ".panel"
    )

    ) return;

    flipGravity();
});

</script>
</body>
  </html>
